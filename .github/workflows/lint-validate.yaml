name: Lint and Validate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint . -c .yamllint.yaml

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Validate Flux Manifests
        run: |
          # Recursively find all Kustomizations in the clusters directory
          # and ensure they can be built successfully
          find clusters -name "*.yaml" -type f | while read -r file; do
            if grep -q "kind: Kustomization" "$file"; then
              echo "Validating $file..."
              flux build kustomization "$(basename "${file%.*}")" \
                --path "$(dirname "$file")" \
                --kustomization-file "$file" > /dev/null
            fi
          done
