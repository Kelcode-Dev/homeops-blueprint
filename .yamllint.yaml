---
extends: default

# Ignore specific paths globally
ignore: |
  .git/
  node_modules/
  **/*.sops.yaml
  .github

yaml-files:
  - '*.yaml'
  - '*.yml'
  - '.yamllint'

rules:
  # DISABLE: Kubernetes manifests and Flux components often exceed any reasonable limit
  line-length: disable

  # DISABLE: K8s manifests rarely use '---' at the top of every file
  document-start: disable

  # DISABLE: Comments can be indented however you like (fixes the homepage/kustomization warning)
  comments-indentation: disable

  # FIX: Set to 2 spaces and allow flexible list (sequence) indentation
  indentation:
    spaces: 2
    indent-sequences: whatever

  # RELAX: Allow 1 space before trailing comments
  comments:
    level: warning
    min-spaces-from-content: 1

  # ALLOW: Empty values are common in Helm values and placeholders
  empty-values:
    forbid-in-block-mappings: false

  # IGNORE: Stop the linter from complaining about 'on/off' or 'yes/no'
  truthy: disable