---
extends: default

# Ignore specific paths globally
ignore: |
  .git/
  node_modules/
  **/*.sops.yaml

yaml-files:
  - '*.yaml'
  - '*.yml'
  - '.yamllint'

rules:
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true

  document-start:
    present: true

  comments:
    level: warning

  empty-values:
    forbid-in-block-mappings: false
