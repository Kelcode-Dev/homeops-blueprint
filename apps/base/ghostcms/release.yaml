apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghostcms
  namespace: ghostcms
spec:
  interval: 24h
  timeout: 15m
  chart:
    spec:
      chart: ghost-on-kubernetes
      version: "1.1.1"
      sourceRef:
        kind: HelmRepository
        name: ghost-on-kubernetes
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/sredevopsorg/ghost-on-kubernetes
      pullPolicy: IfNotPresent
      tag: v6.47.0

    replicaCount: 1

    environment: development

    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1001

    service:
      type: ClusterIP
      port: 2368

    # use our internal smtp relay
    ghost:
      mail:
        service: "SMTP"
        port: 2525
        user: "postmaster@smtp-relay.smtp.svc.cluster.local"
        host: "smtp-relay.smtp.svc.cluster.local"
        from: "noreply@placeholder.local"

    persistence:
      ghost:
        enabled: true
        size: 1Gi
        accessMode: ReadWriteMany

    ingress:
      enabled: false
