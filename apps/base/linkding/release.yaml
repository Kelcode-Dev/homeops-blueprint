apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  interval: 1h
  chart:
    spec:
      chart: linkding
      sourceRef:
        kind: HelmRepository
        name: pascaliske
        namespace: flux-system
  values:
    extraVolumes:
      - name: tmp-folder
        emptyDir: {}

    extraVolumeMounts:
      - name: tmp-folder
        mountPath: /tmp

    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      seccompProfile:
        type: RuntimeDefault

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
