apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: secure-restricted-class
  namespace: tailscale
spec:
  statefulSet:
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tailscaleContainer:
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
