apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  values:
    gitea:
      additionalConfigSources:
        - secret:
            secretName: forgejo-secrets

      config:
        APP_NAME: "YOUR_FORGEJO_INSTANCE_NAME"

      oauth:
        - name: "Authelia"
          existingSecret: forgejo-oidc
          provider: openidConnect
          autoDiscoverUrl: https://authelia.YOUR_DOMAIN/.well-known/openid-configuration
          customAuthUrl: https://authelia.YOUR_DOMAIN/api/oidc/authorization
          customProfileUrl: https://authelia.YOUR_DOMAIN/api/oidc/userinfo
          customTokenUrl: https://authelia.YOUR_DOMAIN/api/oidc/token
          scopes: "openid email profile groups"

      admin:
        existingSecret: forgejo-oidc

    persistence:
      enabled: true
      size: 10Gi
      storageClass: nfs-client

    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: letsencrypt-production
      hosts:
        - host: git.YOUR_DOMAIN
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - git.YOUR_DOMAIN
          secretName: forgejo-tls

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
