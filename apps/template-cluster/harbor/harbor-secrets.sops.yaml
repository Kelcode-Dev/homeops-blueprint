apiVersion: v1
kind: Secret
metadata:
    name: harbor-secrets
    namespace: harbor
type: Opaque
stringData:
    # Don't change the keys, they are hardcoded into the chart :'(
    HARBOR_ADMIN_PASSWORD: changeme             # Admin password
    password: changeme                          # PG password
    REGISTRY_STORAGE_S3_ACCESSKEY: changeme     # S3 accesskey
    REGISTRY_STORAGE_S3_SECRETKEY: changeme     # S3 secretkey
    REDIS_PASSWORD: changeme                    # Redis password
