apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  values:
    nodeSelector:
      node-role.kubernetes.io/cpu-worker: "true"

    pvc:
      size: 1Gi
      storageClassName: nfs-client              # CHANGE this to your storage class

    env:
      - name: LD_SUPERUSER_NAME
        value: admin                            # CHANGE this to the name of your admin user
        # Configure these if you've set up a postgres DB cluster
      - name: LD_DB_ENGINE
        value: postgres
      - name: LD_DB_HOST
        value: pg-shared-rw.databases.svc.cluster.local
      - name: LD_DB_PORT
        value: "5432"
      - name: LD_DB_DATABASE
        value: linkding
      - name: LD_DB_USER
        valueFrom:
          secretKeyRef:
            name: linkding-secrets
            key: pg_username
      - name: LD_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: linkding-secrets
            key: pg_password

    ingressRoute:
      create: true
      entryPoints:
        - websecure
      rule: Host(`linkding.example.com`)        # CHANGE this to your linkding URL
      tlsSecretName: linkding-tls
