apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkding-cert
  namespace: linkding
spec:
  secretName: linkding-tls
  issuerRef:
    name: letsencrypt                   # CHANGE this to your cert-manager cluster issuer
    kind: ClusterIssuer
  dnsNames:
    - linkding.example.com              # CHANGE this to your linkding URL
