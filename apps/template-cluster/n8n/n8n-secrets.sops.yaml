# ---
# SETUP INSTRUCTIONS
# 1. Replace the placeholder values below with your actual credentials.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place n8n-secrets.sops.yaml`
# 3. Ensure your kustomization.yaml points to the .sops.yaml version.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: n8n-secrets
    namespace: n8n
type: Opaque
stringData:
    n8n_encryption_key: "YOUR_N8N_ENCRYPTION_KEY"
    oidc_client_secret: "YOUR_OIDC_CLIENT_SECRET"
    pg_username: "YOUR_PG_USERNAME"
    pg_password: "YOUR_PG_PASSWORD"
    redis_password: "YOUR_REDIS_PASSWORD"
