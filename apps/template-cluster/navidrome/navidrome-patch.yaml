apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  values:
    fullnameOverride: navidrome
    persistence:
      music:
        enabled: true
        mountPath: /music
        size: 1Gi
        storageClass: nfs-client
      data:
        enabled: true
        type: pvc
        mountPath: /data
        size: 1Gi
        storageClass: nfs-client
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    containerSecurityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    nodeSelector:
      workload: worker
    ingress:
      navidrome:
        enabled: true
        primary: true
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          cert-manager.io/cluster-issuer: letsencrypt-issuer
        ingressClassName: traefik
        hosts:
          - host: navidrome.example.com
            paths:
              - path: /
                pathType: Prefix
                overrideService:
                  name: navidrome
                  port: 4533
                  expandObjectName: false
        tls:
          - hosts:
              - navidrome.example.com
            secretName: navidrome-tls
    workload:
      main:
        podSpec:
          containers:
            main:
              envFrom:
                - secretRef:
                    name: lastfm-secret
                    expandObjectName: false
