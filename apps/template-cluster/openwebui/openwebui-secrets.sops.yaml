# ---
# SETUP INSTRUCTIONS
# 1. Replace the placeholder values below with your actual credentials.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place openwebui-secrets.sops.yaml`
# 3. Ensure your kustomization.yaml points to the .sops.yaml version.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: openwebui-secrets
    namespace: openwebui
type: Opaque
stringData:
    # WebUI configuration
    WEBUI_URL: "https://chat.example.com"
    WEBUI_SECRET_KEY: "YOUR_WEBUI_SECRET_KEY"
    OLLAMA_BASE_URL: "http://ollama.ollama.svc.cluster.local:3000"
    ENABLE_PERSISTENT_CONFIG: "true"
    HOME: "/home/node/.open-webui"

    # Database configuration (PostgreSQL)
    DATABASE_TYPE: "postgresdb"
    DATABASE_USER: "YOUR_DB_USER"
    DATABASE_NAME: "YOUR_DB_NAME"
    DATABASE_PASSWORD: "YOUR_DB_PASSWORD"
    DATABASE_HOST: "cluster-pooler-rw.databases.svc.cluster.local"
    DATABASE_PORT: "5432"
    DATABASE_URL: "postgresql://YOUR_DB_USER:YOUR_DB_PASSWORD@cluster-pooler-rw.databases.svc.cluster.local:5432/YOUR_DB_NAME"
    PGSSLMODE: "prefer"

    # Redis configuration
    REDIS_URL: "redis://:YOUR_REDIS_PASSWORD@valkey.valkey.svc.cluster.local:6379/0"
    WEBSOCKET_REDIS_URL: "redis://:YOUR_REDIS_PASSWORD@valkey.valkey.svc.cluster.local:6379/1"

    # OAuth/SSO configuration (Authelia)
    OAUTH_CLIENT_ID: "YOUR_OIDC_CLIENT_ID"
    OAUTH_CLIENT_SECRET: "YOUR_OIDC_CLIENT_SECRET"
    OAUTH_PROVIDER_NAME: "Authelia"
    OPENID_PROVIDER_URL: "https://authelia.example.com/.well-known/openid-configuration"
    OPENID_REDIRECT_URI: "https://chat.example.com/oauth/callback"
    ENABLE_OAUTH_SIGNUP: "true"
    ENABLE_LOGIN_FORM: "true"
