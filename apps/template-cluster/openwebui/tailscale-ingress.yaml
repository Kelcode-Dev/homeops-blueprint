# This is an optional ingress that exposes openwebui over your tailnet
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ts-chat
  namespace: openwebui
spec:
  defaultBackend:
    service:
      name: open-webui
      port:
        number: 80
  ingressClassName: tailscale
  tls:
  - hosts:
    - chat.tailxxx.ts.net
