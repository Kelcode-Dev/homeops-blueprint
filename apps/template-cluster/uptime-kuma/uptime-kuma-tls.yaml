apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uptime-kuma-tls
  namespace: uptime-kuma
spec:
  secretName: uptime-kuma-tls
  issuerRef:
    name: letsencrypt-production    # CHANGE this to your cert-manager cluster issuer
    kind: ClusterIssuer
  dnsNames:
    - uptime.example.com            # CHANGE this to the URL of your uptime instance
