---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxysql
  namespace: proxysql
  labels:
    app.kubernetes.io/name: proxysql
    tags.fluxcd.io/reconcile: true
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxysql
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxysql
          image: proxysql/proxysql:3.0.9
          ports:
            - name: proxysql
              containerPort: 6032
              protocol: TCP
            - name: proxysql-admin
              containerPort: 6033
              protocol: TCP
          env:
            - name: PROXYSQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxysql-admin-password
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: 6032
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6032
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
