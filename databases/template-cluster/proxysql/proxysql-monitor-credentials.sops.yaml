# ---
# SETUP INSTRUCTIONS
# 1. Replace 'YOUR_PROXYSQL_MONITOR_PASSWORD' with your actual monitor password.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place proxysql-monitor-credentials.sops.yaml`
# 3. Ensure your kustomization.yaml points to the .sops.yaml version.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: proxysql-monitor-credentials
    namespace: proxysql
type: Opaque
stringData:
    password: "YOUR_PROXYSQL_MONITOR_PASSWORD"
