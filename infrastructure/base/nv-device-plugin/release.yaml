apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvdp
  namespace: nvidia
spec:
  interval: 24h
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.19"
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
  values:
    # Use the runtime you just configured in your machine patch
    runtimeClassName: nvidia
    version: 0.19

    config:
      inline: |-
        version: v1
        flags:
          passDeviceSpecs: true
          failOnInitError: true

    containerSecurityContext:
      privileged: true
      allowPrivilegeEscalation: true
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      seccompProfile:
        type: RuntimeDefault

    # This is the "Root Mode" requirement
    privileged: true

    # Ensure the plugin lands on your tainted GPU nodes
    nodeSelector:
      node-role.kubernetes.io/gpu-worker: "true"
