apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  values:
    # Identity & Volumes (Root level, lowercase)
    secret:
      existingSecret: authelia-secrets
    pod:
      extraVolumes:
        - name: users-file
          secret:
            secretName: authelia-user-secrets
        - name: oidc-keys
          secret:
            secretName: oidc-secrets
      extraVolumeMounts:
        - name: users-file
          mountPath: /config/users.yml
          subPath: users.yml
          readOnly: true
        - name: oidc-keys
          mountPath: /secrets/oidc
          readOnly: true

    # Ingress settings
    ingress:
      enabled: true
      traefikCRD:
        enabled: false
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      tls:
        enabled: true

    # Application Config
    configMap:
      theme: dark
      default_2fa_method: totp
      authentication_backend:
        file:
          enabled: true
          path: /config/users.yml
      session:
        redis:
          enabled: true
          host: valkey.valkey.svc.cluster.local
          port: 6379
          database_index: 10
        cookies:
          - domain: example.com
            subdomain: authelia
      storage:
        postgres:
          enabled: true
          address: tcp://pg-shared-rw.databases.svc.cluster.local:5432
          database: authelia
          username: authelia
      notifier:
        filesystem:
          enabled: false
        smtp:
          enabled: true
          address: "smtp://smtp-relay.smtp.svc.cluster.local:25"
          timeout: "5s"
          sender: "Authelia <talos@example.com>"
          disable_starttls: true
          disable_require_tls: true
          username: ""
          tls:
            skip_verify: true

      identity_providers:
        oidc:
          enabled: true
          jwks:
            - algorithm: 'RS256'
              use: 'sig'
              key:
                path: '/secrets/oidc/oidc.jwk.rsa256.pem'

