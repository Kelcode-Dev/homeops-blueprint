apiVersion: v1
kind: Secret
metadata:
    name: authelia-secrets
    namespace: authelia
type: Opaque
stringData:
    # these passwords are typically integration related and can be generated with `openssl rand -hex 32`
    identity_validation.reset_password.jwt.hmac.key: changeme
    session.encryption.key: changeme
    session.redis.password.txt: changeme
    storage.encryption.key: changeme
    storage.postgres.password.txt: changeme
    cnpg.superuser.password: changeme
    identity_providers.oidc.hmac.key: changeme
    notifier.smtp.password.txt: ""
