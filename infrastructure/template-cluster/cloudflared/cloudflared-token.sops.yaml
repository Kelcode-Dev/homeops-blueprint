# ---
# SETUP INSTRUCTIONS
# 1. Replace 'YOUR_CLOUDFLARE_TUNNEL_TOKEN' with your actual Cloudflared tunnel token below.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place cloudflared-token.sops.yaml`
# 3. Ensure your kustomization.yaml points to the .sops.yaml version.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: cloudflared-token
    namespace: cloudflared
type: Opaque
stringData:
    TUNNEL_TOKEN: "YOUR_CLOUDFLARE_TUNNEL_TOKEN"
