# ---
# SETUP INSTRUCTIONS
# 1. Replace the placeholder values below with your actual DNS provider credentials.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place external-dns-secrets.sops.yaml`
# 3. Ensure your kustomization.yaml points to the .sops.yaml version.
# 4. Update the deployment-patch.yaml with your provider-specific args and env vars.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: external-dns-secrets
    namespace: externaldns
    labels:
        app.kubernetes.io/name: external-dns
type: Opaque
stringData:
    # Example for Cloudflare:
    # CF_API_TOKEN: "YOUR_CLOUDFLARE_API_TOKEN"
    #
    # Example for pihole:
    # EXTERNAL_DNS_PIHOLE_SERVER: "YOUR_PIHOLE_SERVER"
    # EXTERNAL_DNS_PIHOLE_PASSWORD: "YOUR_PIHOLE_PASSWORD"
    # EXTERNAL_DNS_PIHOLE_TLS_SKIP_VERIFY: "true"
    # EXTERNAL_DNS_PIHOLE_API_VERSION: "v1"
    #
    # Example for Route53 (use IAM role instead if possible):
    # AWS_ACCESS_KEY_ID: "YOUR_AWS_ACCESS_KEY"
    # AWS_SECRET_ACCESS_KEY: "YOUR_AWS_SECRET_KEY"
