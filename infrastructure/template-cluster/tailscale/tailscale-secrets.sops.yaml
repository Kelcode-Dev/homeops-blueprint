# ---
# SETUP INSTRUCTIONS
# 1. Replace the CLIENT_ID and CLIENT_SECRET with your actual token below.
# 2. Run this command to encrypt the file with your own Age key:
#    `sops --encrypt --in-place tailscale-secrets.sops.yaml`
# 4. Ensure your kustomization.yaml points to the .sops.yaml version.
# ---

apiVersion: v1
kind: Secret
metadata:
    name: operator-oauth
    namespace: tailscale
type: Opaque
stringData:
    client-id: TAILSCALE_OAUTH_CLIENT_ID
    client-secret: TAILSCALE_OAUTH_CLIENT_SECRET
